<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>*cats</title>
<style>
  html, body { margin: 0; overflow: hidden; background: black; width: 100%; height: 100%; }
  #container { position: absolute; top: 0; left: 0; }
  #overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center;
    pointer-events: none;
    z-index: 1;
  }
  #overlay p {
    font-family: monospace;
    color: #ff00ff;
    font-size: 1.5rem;
    text-align: left;
    padding-left: 2rem;
    width: 400px;
    white-space: pre-line;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div id="container"></div>
<div id="overlay">
  <p>*cats (pronounced star-cats) is a perennial clowder of 50 (median, σ=9.84) human-kitties.

We will be at Burning Man 2026.   
</p>
</div>
<script>
// ── Configuration ──────────────────────────────────────────────
const SVG_PATH = 'trace.svg';
const INNER_X = 493;        // x of inner copy top-left (SVG user units)
const INNER_Y = 436;        // y of inner copy top-left (SVG user units)
const INNER_W = 16;         // width of inner copy (SVG user units)
const INNER_H = 16;         // height of inner copy (SVG user units)
const LOOP_DURATION = 10;   // seconds per loop

// ── Globals ────────────────────────────────────────────────────
let svgText = '';
let vbX = 0, vbY = 0, vbW = 0, vbH = 0;  // original SVG viewBox
let W = 0, H = 0;                          // SVG pixel dimensions
let S_x = 0, S_y = 0;

function computeLevels(t) {
  const iw = W / S_x;
  const ih = H / S_y;

  const e_x = S_x > 1 ? (Math.pow(S_x, t) - 1) / (S_x - 1) : t;
  const e_y = S_y > 1 ? (Math.pow(S_y, t) - 1) / (S_y - 1) : t;

  const sx_1 = (iw + (W - iw) * e_x) / W;
  const sy_1 = (ih + (H - ih) * e_y) / H;
  const tx_1 = INNER_X * (1 - e_x);
  const ty_1 = INNER_Y * (1 - e_y);

  const sx_0 = sx_1 * W / iw;
  const sy_0 = sy_1 * H / ih;
  const tx_0 = tx_1 - sx_0 * INNER_X;
  const ty_0 = ty_1 - sy_0 * INNER_Y;

  const logS = Math.log(Math.max(S_x, S_y, 1.01));
  const kMax = Math.ceil(Math.log(2 * Math.max(W, H)) / logS) + 2;
  console.log(kMax);
  const levels = [];
  let sx = sx_0, sy = sy_0, tx = tx_0, ty = ty_0;

  for (let k = 0; k <= kMax; k++) {
    if (Math.max(sx * W, sy * H) < 0.5) break;
    levels.push({ sx, sy, tx, ty });
    tx = sx * INNER_X + tx;
    ty = sy * INNER_Y + ty;
    sx = sx * iw / W;
    sy = sy * ih / H;
  }
  return levels;
}

function renderFrame(t, container, screenW, screenH) {
  const levels = computeLevels(t);

  // Cover-fit: scale SVG to fill viewport, preserving aspect ratio
  const scaleX = screenW / W;
  const scaleY = screenH / H;
  const scale = Math.max(scaleX, scaleY);
  const offsetX = (screenW - W * scale) / 2;
  const offsetY = (screenH - H * scale) / 2;

  // px2svg conversion factors
  const px2svgX = vbW / W;
  const px2svgY = vbH / H;

  // Clear previous content
  container.innerHTML = '';

  for (const { sx, sy, tx, ty } of levels) {
    // Viewport bounds in SVG-pixel space
    const pxMin = tx;
    const pyMin = ty;
    const pxMax = sx * W + tx;
    const pyMax = sy * H + ty;

    // Clip to the SVG canvas (0..W, 0..H)
    const vpX1 = Math.max(0, Math.floor(pxMin));
    const vpY1 = Math.max(0, Math.floor(pyMin));
    const vpX2 = Math.min(W, Math.ceil(pxMax));
    const vpY2 = Math.min(H, Math.ceil(pyMax));
    const vpW = vpX2 - vpX1;
    const vpH = vpY2 - vpY1;
    if (vpW < 1 || vpH < 1) continue;

    // Compute the SVG viewBox for this level's visible region
    const newVbX = vbX + (vpX1 - tx) / sx * px2svgX;
    const newVbY = vbY + (vpY1 - ty) / sy * px2svgY;
    const newVbW = vpW / sx * px2svgX;
    const newVbH = vpH / sy * px2svgY;

    // Create an <img> with a data URI of the modified SVG
    const modifiedSvg = svgText
      .replace(/viewBox="[^"]*"/, `viewBox="${newVbX} ${newVbY} ${newVbW} ${newVbH}"`)
      .replace(/width="[^"]*"/, `width="${vpW}"`)
      .replace(/height="[^"]*"/, `height="${vpH}"`)
      .replace(/preserveAspectRatio="[^"]*"/, `preserveAspectRatio="none"`);

    const img = document.createElement('img');
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(modifiedSvg);
    img.style.position = 'absolute';
    img.style.left = (offsetX + vpX1 * scale) + 'px';
    img.style.top = (offsetY + vpY1 * scale) + 'px';
    img.style.width = (vpW * scale) + 'px';
    img.style.height = (vpH * scale) + 'px';
    container.appendChild(img);
  }
}

async function init() {
  const resp = await fetch(SVG_PATH);
  svgText = await resp.text();

  // Parse viewBox
  const vbMatch = svgText.match(/viewBox="([^"]*)"/);
  if (vbMatch) {
    [vbX, vbY, vbW, vbH] = vbMatch[1].split(/\s+/).map(Number);
  }

  // Parse width/height (fall back to viewBox dimensions)
  const wMatch = svgText.match(/width="([0-9.]+)"/);
  const hMatch = svgText.match(/height="([0-9.]+)"/);
  W = wMatch ? parseFloat(wMatch[1]) : vbW;
  H = hMatch ? parseFloat(hMatch[1]) : vbH;

  S_x = W / INNER_W;
  S_y = H / INNER_H;

  // Ensure preserveAspectRatio attribute exists so we can replace it
  if (!/preserveAspectRatio/.test(svgText)) {
    svgText = svgText.replace(/<svg/, '<svg preserveAspectRatio="none"');
  }

  const container = document.getElementById('container');
  let startTime = null;

  function loop(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = (timestamp - startTime) / 1000;
    const t = (elapsed % LOOP_DURATION) / LOOP_DURATION;

    renderFrame(t, container, window.innerWidth, window.innerHeight);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

init();
</script>
</body>
</html>
