const INNER_X = 493;
const INNER_Y = 436;
const INNER_W = 16;
const INNER_H = 16;
const LOOP_DURATION = 10;

// ── Globals ────────────────────────────────────────────────────
let W = 0, H = 0;
let S_x = 0, S_y = 0;
let svgBlobUrl = null;
const pool = [];       // reusable {wrap, img} elements
const MAX_POOL = 20;

function computeLevels(t) {
  const iw = W / S_x;
  const ih = H / S_y;

  const e_x = S_x > 1 ? (Math.pow(S_x, t) - 1) / (S_x - 1) : t;
  const e_y = S_y > 1 ? (Math.pow(S_y, t) - 1) / (S_y - 1) : t;

  const sx_1 = (iw + (W - iw) * e_x) / W;
  const sy_1 = (ih + (H - ih) * e_y) / H;
  const tx_1 = INNER_X * (1 - e_x);
  const ty_1 = INNER_Y * (1 - e_y);

  const sx_0 = sx_1 * W / iw;
  const sy_0 = sy_1 * H / ih;
  const tx_0 = tx_1 - sx_0 * INNER_X;
  const ty_0 = ty_1 - sy_0 * INNER_Y;

  const logS = Math.log(Math.max(S_x, S_y, 1.01));
  const kMax = Math.ceil(Math.log(2 * Math.max(W, H)) / logS) + 2;
  const levels = [];
  let sx = sx_0, sy = sy_0, tx = tx_0, ty = ty_0;

  for (let k = 0; k <= kMax; k++) {
    if (Math.max(sx * W, sy * H) < 0.5) break;
    levels.push({ sx, sy, tx, ty });
    tx = sx * INNER_X + tx;
    ty = sy * INNER_Y + ty;
    sx = sx * iw / W;
    sy = sy * ih / H;
  }
  return levels;
}

function renderFrame(t, container, screenW, screenH) {
  const levels = computeLevels(t);

  const scaleX = screenW / W;
  const scaleY = screenH / H;
  const scale = Math.max(scaleX, scaleY);
  const offsetX = (screenW - W * scale) / 2;
  const offsetY = (screenH - H * scale) / 2;

  // Ensure we have enough pooled elements
  while (pool.length < levels.length && pool.length < MAX_POOL) {
    const wrap = document.createElement('div');
    wrap.className = 'level-wrap';
    const img = document.createElement('img');
    img.src = svgBlobUrl;
    wrap.appendChild(img);
    container.appendChild(wrap);
    pool.push({ wrap, img });
  }

  let i = 0;
  for (const { sx, sy, tx, ty } of levels) {
    if (i >= pool.length) break;

    const vpX1 = Math.max(0, tx);
    const vpY1 = Math.max(0, ty);
    const vpX2 = Math.min(W, tx + sx * W);
    const vpY2 = Math.min(H, ty + sy * H);
    if (vpX2 - vpX1 < 1 || vpY2 - vpY1 < 1) continue;

    const { wrap, img } = pool[i];

    // Wrapper = the clipped viewport region on screen
    const wLeft = offsetX + vpX1 * scale;
    const wTop = offsetY + vpY1 * scale;
    const wWidth = (vpX2 - vpX1) * scale;
    const wHeight = (vpY2 - vpY1) * scale;

    wrap.style.cssText = 'position:absolute;overflow:hidden;display:block;' +
      'left:' + wLeft + 'px;top:' + wTop + 'px;' +
      'width:' + wWidth + 'px;height:' + wHeight + 'px';

    // The full SVG image, scaled to this level's size on screen
    const imgW = sx * W * scale;
    const imgH = sy * H * scale;
    const imgLeft = (tx - vpX1) * scale;
    const imgTop = (ty - vpY1) * scale;

    img.style.cssText = 'position:absolute;' +
      'left:' + imgLeft + 'px;top:' + imgTop + 'px;' +
      'width:' + imgW + 'px;height:' + imgH + 'px';

    i++;
  }

  // Hide unused pool elements
  for (; i < pool.length; i++) {
    pool[i].wrap.style.display = 'none';
  }
}

function init() {
  const svgText = SVG_INLINE;

  const wMatch = svgText.match(/width="([0-9.]+)"/);
  const hMatch = svgText.match(/height="([0-9.]+)"/);
  const vbMatch = svgText.match(/viewBox="([^"]*)"/);
  let vbW = 0, vbH = 0;
  if (vbMatch) {
    const parts = vbMatch[1].split(/\s+/).map(Number);
    vbW = parts[2]; vbH = parts[3];
  }
  W = wMatch ? parseFloat(wMatch[1]) : vbW;
  H = hMatch ? parseFloat(hMatch[1]) : vbH;

  S_x = W / INNER_W;
  S_y = H / INNER_H;

  // Create a single Blob URL for the SVG (vector, renders crisp at any size)
  const blob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
  svgBlobUrl = URL.createObjectURL(blob);

  const container = document.getElementById('container');
  let startTime = null;

  function loop(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = (timestamp - startTime) / 1000;
    const t = (elapsed % LOOP_DURATION) / LOOP_DURATION;
    renderFrame(t, container, window.innerWidth, window.innerHeight);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

init();
